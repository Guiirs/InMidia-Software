services:
  mongo-staging:
    image: mongo:7
    container_name: inmidia-mongo-staging
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: inmidia_staging
    volumes:
      - inmidia_mongo_staging_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  inmidia_mongo_staging_data:
