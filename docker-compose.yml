services:
  api:
    build: .
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - MONGODB_URI=${MONGODB_URI:?MONGODB_URI is required}
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - CORS_ORIGIN=${CORS_ORIGIN:?CORS_ORIGIN is required}
      - METRICS_USER=${METRICS_USER:?METRICS_USER is required}
      - METRICS_PASSWORD=${METRICS_PASSWORD:?METRICS_PASSWORD is required}
      - SYNC_REDIS_ENABLED=${SYNC_REDIS_ENABLED:-true}
      - SYNC_REDIS_MODE=${SYNC_REDIS_MODE:-streams}
      - SYNC_DIAGNOSTICS_REDIS_ENABLED=${SYNC_DIAGNOSTICS_REDIS_ENABLED:-true}
      - SYNC_STREAM_MAXLEN=${SYNC_STREAM_MAXLEN:-5000}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backstage-network
    restart: unless-stopped

  mongo:
    image: mongo:6.0
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME is required}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      - MONGO_INITDB_DATABASE=${MONGO_DB_NAME:-api_db}
    volumes:
      - mongo_data:/data/db
    networks:
      - backstage-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backstage-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
  redis_data:

networks:
  backstage-network:
    driver: bridge
